[trunk]
# Sincroniza caches de build entre worktrees (node_modules, target, etc)
copy = ["node_modules", ".next", "dist"]

[templates]
# Gera .env com porta única por worktree (evita conflito de dev servers)
env = """
PORT={{ hash_port 3000 }}
API_PORT={{ hash_port 8000 }}
"""

[hooks]
# Roda quando cria novo worktree
post-create = """
#!/bin/bash
cd "{{ path }}"
echo "{{ templates.env }}" > .env
npm install  # ou pip install, etc
"""

# Roda quando entra no worktree (wt switch)
post-start = """
#!/bin/bash  
cd "{{ path }}"
npm run dev &  # ou seu dev server
echo "Agente pronto em {{ path }} na porta $(grep PORT .env | cut -d= -f2)"
"""

# Antes de fazer merge para main
pre-merge = """
#!/bin/bash
cd "{{ path }}"
npm run test  # ou lint, type-check, etc
"""