<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title data-i18n="new.page_title"></title>
<link href="./assets/css/fonts.css" rel="stylesheet"/>
<link href="./assets/css/compiled.css" rel="stylesheet"/>
<link href="./assets/css/theme-override.css" rel="stylesheet"/>
<script src="./i18n.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = __t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = __t(el.dataset.i18nPlaceholder);
  });
});
</script>
<script src="script.js" defer></script>
<script>
// Wait for both DOM and script.js to be ready
function waitForElements() {
  return new Promise((resolve) => {
    const checkElements = () => {
      const projectPathInput = document.getElementById('project-path');
      const projectNameInput = document.getElementById('project-name');
      const githubUrlInput = document.getElementById('github-url');
      
      if (projectPathInput && projectNameInput && githubUrlInput) {
        resolve();
      } else {
        setTimeout(checkElements, 50);
      }
    };
    checkElements();
  });
}

document.addEventListener('DOMContentLoaded', async () => {
  // Wait for elements to be available
  await waitForElements();
  
  // Check if creating from folder selection
  const createFromFolder = sessionStorage.getItem('createFromFolder');
  const selectedProjectPath = sessionStorage.getItem('selectedProjectPath');
  
  if (createFromFolder === 'true' && selectedProjectPath) {
    console.log('Creating from folder:', selectedProjectPath);
    
    // Small delay to ensure script.js has finished
    setTimeout(async () => {
      // Pre-fill the project path
      const projectPathInput = document.getElementById('project-path');
      if (projectPathInput) {
        // Normalize the path using the same utility as script.js
        let normalizedPath = selectedProjectPath;
        if (window.electronAPI && window.electronAPI.normalizePath) {
          try {
            normalizedPath = await window.electronAPI.normalizePath(selectedProjectPath);
          } catch (error) {
            console.warn('Failed to normalize path:', error);
          }
        }
        
        projectPathInput.value = normalizedPath;
        console.log('Project path set to:', projectPathInput.value);
        
        // Trigger input event to ensure any listeners are notified
        projectPathInput.dispatchEvent(new Event('input', { bubbles: true }));
      } else {
        console.error('Project path input not found');
      }
      
      // Get folder info and pre-fill other fields if possible
      (async () => {
        if (window.electronAPI && window.electronAPI.getFolderInfo) {
          try {
            const folderInfo = await window.electronAPI.getFolderInfo(selectedProjectPath);
            
            if (folderInfo.isGitRepo && folderInfo.remoteUrl) {
              // Pre-fill GitHub URL
              const githubUrlInput = document.getElementById('github-url');
              if (githubUrlInput) {
                githubUrlInput.value = folderInfo.remoteUrl;
                githubUrlInput.dispatchEvent(new Event('input', { bubbles: true }));
              }
              
              // Pre-fill project name from repo name
              const projectNameInput = document.getElementById('project-name');
              if (projectNameInput && !projectNameInput.value) {
                const repoName = folderInfo.remoteUrl.split('/').pop().replace('.git', '');
                projectNameInput.value = repoName;
                projectNameInput.dispatchEvent(new Event('input', { bubbles: true }));
              }
            }
            
            // Store folder info for later use
            sessionStorage.setItem('folderInfo', JSON.stringify(folderInfo));
          } catch (error) {
            console.error('Error getting folder info:', error);
          }
        }
        
        // Clear session storage
        sessionStorage.removeItem('createFromFolder');
        sessionStorage.removeItem('selectedProjectPath');
      })();
    }, 100); // Small delay to ensure script.js has finished
  }
});
</script>
</head>
<body class="bg-background-dark text-text-dark antialiased">
<div class="flex flex-col h-screen">
<div class="flex-1 flex items-center justify-center p-8 pb-24">
<div class="w-full max-w-2xl">
<div class="text-center mb-10">
<div class="flex items-center justify-center gap-4 mb-4">
<svg class="h-10 w-10 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<h1 class="text-4xl font-black text-text-dark" data-i18n="new.title"></h1>
</div>
<p class="text-muted-dark text-lg" data-i18n="new.subtitle"></p>
</div>

<div class="mb-6">
<button data-navigate="index.html" class="flex items-center gap-2 text-muted-dark hover:text-text-dark transition-colors duration-200">
<span class="material-symbols-outlined">arrow_back</span>
<span data-i18n="new.back_home"></span>
</button>
</div>
<div class="bg-surface-dark rounded-lg p-8 space-y-6">
<div>
<label class="block text-sm font-medium text-muted-dark mb-2" for="project-name" data-i18n="new.project_name"></label>
<input class="w-full bg-gray-900 border-gray-700 text-text-dark rounded-md focus:ring-primary focus:border-primary" id="project-name" name="project-name" placeholder="" data-i18n-placeholder="new.project_name_placeholder" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-muted-dark mb-2" for="github-url" data-i18n="new.github_url"></label>
<input class="w-full bg-gray-900 border-gray-700 text-text-dark rounded-md focus:ring-primary focus:border-primary" id="github-url" name="github-url" placeholder="" data-i18n-placeholder="new.github_url_placeholder" type="url"/>
</div>
<div>
<label class="block text-sm font-medium text-muted-dark mb-2" for="project-path" data-i18n="new.folder_path"></label>
<div class="flex items-center space-x-2">
<input class="flex-1 w-full bg-gray-900 border-gray-700 text-text-dark rounded-md focus:ring-primary focus:border-primary" id="project-path" name="project-path" type="text"/>
<button class="bg-gray-700 hover:bg-gray-600 text-text-dark font-semibold py-2 px-4 rounded-md flex items-center gap-2 transition-colors duration-300" id="select-folder-button">
<span class="material-symbols-outlined text-xl">folder_open</span>
<span data-i18n="select"></span>
</button>
</div>
</div>
</div>
</div>
</div>
<div class="p-4 border-t border-gray-800 bg-surface-dark mt-auto">
<div class="flex justify-end max-w-2xl mx-auto">
<button class="bg-primary hover:bg-green-500 text-white font-semibold py-2 px-5 rounded-md flex items-center gap-2 transition-colors duration-300 text-sm" id="create-project-button">
<span class="material-symbols-outlined">add_circle</span>
<span data-i18n="new.create_project"></span>
</button>
</div>
</div>
</div>

</body></html>
