<!DOCTYPE html>
<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Documental - Novo Projeto</title>
<link href="./assets/css/fonts.css" rel="stylesheet"/>

<link href="./assets/css/compiled.css" rel="stylesheet"/>
    <link href="./assets/css/theme-override.css" rel="stylesheet"/>


<script src="./shared/layout.js"></script>
<script src="./shared/header.js"></script>
<script src="./shared/footer.js"></script>
<script src="./shared/logo.js"></script>

<script>
// Wait for both DOM and script.js to be ready
function waitForElements() {
  return new Promise((resolve) => {
    const checkElements = () => {
      const projectPathInput = document.getElementById('project-path');
      const projectNameInput = document.getElementById('project-name');
      const githubUrlInput = document.getElementById('github-url');
      
      if (projectPathInput && projectNameInput && githubUrlInput) {
        resolve();
      } else {
        setTimeout(checkElements, 50);
      }
    };
    checkElements();
  });
}

document.addEventListener('DOMContentLoaded', async () => {
  // Wait for elements to be available
  await waitForElements();
  
  // Check if creating from folder selection
  const createFromFolder = sessionStorage.getItem('createFromFolder');
  const selectedProjectPath = sessionStorage.getItem('selectedProjectPath');
  
  if (createFromFolder === 'true' && selectedProjectPath) {
    console.log('Creating from folder:', selectedProjectPath);
    
    // Small delay to ensure script.js has finished
    setTimeout(async () => {
      // Pre-fill the project path
      const projectPathInput = document.getElementById('project-path');
      if (projectPathInput) {
        // Normalize the path using the same utility as script.js
        let normalizedPath = selectedProjectPath;
        if (window.electronAPI && window.electronAPI.normalizePath) {
          try {
            normalizedPath = await window.electronAPI.normalizePath(selectedProjectPath);
          } catch (error) {
            console.warn('Failed to normalize path:', error);
          }
        }
        
        projectPathInput.value = normalizedPath;
        console.log('Project path set to:', projectPathInput.value);
        
        // Trigger input event to ensure any listeners are notified
        projectPathInput.dispatchEvent(new Event('input', { bubbles: true }));
      } else {
        console.error('Project path input not found');
      }
      
      // Get folder info and pre-fill other fields if possible
      (async () => {
        if (window.electronAPI && window.electronAPI.getFolderInfo) {
          try {
            const folderInfo = await window.electronAPI.getFolderInfo(selectedProjectPath);
            
            if (folderInfo.isGitRepo && folderInfo.remoteUrl) {
              // Pre-fill GitHub URL
              const githubUrlInput = document.getElementById('github-url');
              if (githubUrlInput) {
                githubUrlInput.value = folderInfo.remoteUrl;
                githubUrlInput.dispatchEvent(new Event('input', { bubbles: true }));
              }
              
              // Pre-fill project name from repo name
              const projectNameInput = document.getElementById('project-name');
              if (projectNameInput && !projectNameInput.value) {
                const repoName = folderInfo.remoteUrl.split('/').pop().replace('.git', '');
                projectNameInput.value = repoName;
                projectNameInput.dispatchEvent(new Event('input', { bubbles: true }));
              }
            }
            
            // Store folder info for later use
            sessionStorage.setItem('folderInfo', JSON.stringify(folderInfo));
          } catch (error) {
            console.error('Error getting folder info:', error);
          }
        }
        
        // Clear session storage
        sessionStorage.removeItem('createFromFolder');
        sessionStorage.removeItem('selectedProjectPath');
      })();
    }, 100); // Small delay to ensure script.js has finished
  }
});
</script>
</head>
<body class="bg-background-dark text-text-dark antialiased">
<script>
document.write(Documental.renderLayout({
  content: '\
<div class="flex-1 flex items-center justify-center p-8 pb-24">\
<div class="w-full max-w-2xl">\
<div class="text-center mb-10">\
<div class="flex items-center justify-center gap-4 mb-4">\
' + Documental.renderLogo({ size: 'md' }) + '\
<h1 class="text-4xl font-black text-text-dark">Criar Novo Projeto</h1>\
</div>\
<p class="text-muted-dark text-lg">Preencha os detalhes abaixo para criar seu novo projeto.</p>\
</div>\
\
<div class="mb-6">\
<button data-navigate="index.html" class="btn-ghost flex items-center gap-2">\
<span class="material-symbols-outlined">arrow_back</span>\
<span>Voltar para tela inicial</span>\
</button>\
</div>\
<div class="bg-surface-dark rounded-lg p-8 space-y-6">\
<div>\
<label class="block text-sm font-medium text-muted-dark mb-2" for="project-name">Nome do Projeto</label>\
<input class="w-full bg-background-dark border-border-subtle text-text-dark rounded-md focus:ring-primary focus:border-primary" id="project-name" name="project-name" placeholder="Ex: Meu Incrível Projeto" type="text"/>\
</div>\
<div>\
<label class="block text-sm font-medium text-muted-dark mb-2" for="github-url">URL do Repositório Git</label>\
<input class="w-full bg-background-dark border-border-subtle text-text-dark rounded-md focus:ring-primary focus:border-primary" id="github-url" name="github-url" placeholder="https://github.com/usuario/repositorio.git" type="url"/>\
</div>\
<div>\
<label class="block text-sm font-medium text-muted-dark mb-2" for="project-path">Caminho da Pasta</label>\
<div class="flex items-center space-x-2">\
<input class="flex-1 w-full bg-background-dark border-border-subtle text-text-dark rounded-md focus:ring-primary focus:border-primary" id="project-path" name="project-path" type="text"/>\
<button class="btn-secondary py-2 px-4 font-semibold flex items-center gap-2" id="select-folder-button">\
<span class="material-symbols-outlined text-xl">folder_open</span>\
<span>Selecionar</span>\
</button>\
</div>\
</div>\
</div>\
</div>\
</div>',
  footer: Documental.renderFooter({
    buttons: [{
      label: '<span class="material-symbols-outlined">add_circle</span> <span>Criar Projeto</span>',
      class: 'btn-primary flex items-center gap-2 text-sm',
      id: 'create-project-button'
    }],
    maxWidth: 'max-w-2xl mx-auto'
  })
}));
Documental.initThemeAttributes();
</script>

<script src="script.js" defer></script>
</body></html>
