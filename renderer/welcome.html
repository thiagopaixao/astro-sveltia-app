<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Documental - Welcome</title>
<link href="./assets/css/fonts.css" rel="stylesheet"/>
<link href="./assets/css/compiled.css" rel="stylesheet"/>
<link href="./assets/css/theme-override.css" rel="stylesheet"/>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        body {
            min-height: 100vh;
            position: relative;
        }
        
        .fixed-footer {
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
            z-index: 9999 !important;
            background-color: var(--color-surface-dark) !important;
            border-top: 2px solid var(--color-border-subtle) !important;
            padding: 1rem 2rem !important;
            margin: 0 !important;
            width: 100vw !important;
            box-sizing: border-box !important;
        }
        
        .main-content {
            padding-top: 8vh !important;
            min-height: calc(100vh - 120px);
        }
        
        @media (min-height: 800px) {
            .main-content {
                padding-top: 10vh !important;
            }
        }
        
        @media (min-height: 1000px) {
            .main-content {
                padding-top: 12vh !important;
            }
        }
        
        @media (min-height: 1200px) {
            .main-content {
                padding-top: 15vh !important;
            }
        }
    </style>

</head>
<body class="bg-background-dark text-text-dark antialiased">
    <div class="flex flex-col min-h-screen" x-data="welcomeWizard">
        <!-- Progress Bar -->
        <div class="h-1 bg-gray-800">
            <div class="h-full welcome-gradient transition-all duration-500" :style="`width: ${(currentStep / totalSteps) * 100}%`"></div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex items-start justify-center main-content pb-24 px-4 md:px-8">
            <div class="w-full max-w-4xl">
                
                <!-- Step 1: Welcome -->
                <div x-show="currentStep === 1" x-transition:enter="transition ease-out duration-500" x-transition:enter-start="opacity-0 transform scale-95" x-transition:enter-end="opacity-100 transform scale-100" class="text-center fade-in relative">
                    <div class="mb-12">
                        <div class="inline-flex items-center justify-center w-24 h-24 rounded-full welcome-gradient mb-6">
                            <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                            </svg>
                        </div>
                        <h1 class="text-5xl font-black text-text-dark mb-4" x-text="$store.i18n.t('welcome.title')"></h1>
                        <p class="text-xl text-muted-dark max-w-2xl mx-auto leading-relaxed" x-text="$store.i18n.t('welcome.subtitle')">
                        </p>
                    </div>
 
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12 max-w-3xl mx-auto">
                        <div class="bg-surface-dark rounded-lg p-6 text-center">
                            <span class="material-symbols-outlined text-3xl text-primary mb-3">rocket_launch</span>
                            <h3 class="font-semibold text-text-dark mb-2" x-text="$store.i18n.t('welcome.quick_start')"></h3>
                            <p class="text-sm text-muted-dark" x-text="$store.i18n.t('welcome.quick_start_desc')"></p>
                        </div>
                        <div class="bg-surface-dark rounded-lg p-6 text-center">
                            <span class="material-symbols-outlined text-3xl text-primary mb-3">integration_instructions</span>
                            <h3 class="font-semibold text-text-dark mb-2" x-text="$store.i18n.t('welcome.git_integration')"></h3>
                            <p class="text-sm text-muted-dark" x-text="$store.i18n.t('welcome.git_integration_desc')"></p>
                        </div>
                        <div class="bg-surface-dark rounded-lg p-6 text-center">
                            <span class="material-symbols-outlined text-3xl text-primary mb-3">auto_awesome</span>
                            <h3 class="font-semibold text-text-dark mb-2" x-text="$store.i18n.t('welcome.modern_experience')"></h3>
                            <p class="text-sm text-muted-dark" x-text="$store.i18n.t('welcome.modern_experience_desc')"></p>
                        </div>
                    </div>
 
                    <div class="mt-10 flex justify-center gap-4">
                        <button onclick="if(window.electronAPI&amp;&amp;window.electronAPI.navigateTo){window.electronAPI.navigateTo('language.html')}else{window.location.href='language.html'}"
                                class="bg-gray-700 hover:bg-gray-600 text-gray-300 font-semibold py-3 px-8 rounded-lg flex items-center gap-2 transition-all duration-300 transform hover:scale-105"
                                style="border:1px solid var(--color-border-default);">
                            <span class="material-symbols-outlined">arrow_back</span>
                            <span x-text="$store.i18n.t('common.back') || 'Voltar'"></span>
                        </button>
                        <button @click="nextStep()"
                                class="bg-primary hover:bg-green-500 text-white font-semibold py-3 px-10 rounded-lg flex items-center gap-2 transition-all duration-300 transform hover:scale-105">
                            <span x-text="$store.i18n.t('welcome.start_setup')"></span>
                            <span class="material-symbols-outlined">arrow_forward</span>
                        </button>
                    </div>
                </div>


                <!-- Step 2: GitHub Authentication Explanation -->
                <div x-show="currentStep === 2" x-transition:enter="transition ease-out duration-500" x-transition:enter-start="opacity-0 transform scale-95" x-transition:enter-end="opacity-100 transform scale-100" class="text-center fade-in">
                    <div class="mb-12">
                        <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-gray-800 mb-6">
                            <span class="material-symbols-outlined text-4xl text-primary">link</span>
                        </div>
                        <h1 class="text-4xl font-black text-text-dark mb-4" x-text="$store.i18n.t('welcome.connect_github_title')"></h1>
                        <p class="text-xl text-muted-dark max-w-2xl mx-auto leading-relaxed mb-8" x-text="$store.i18n.t('welcome.connect_github_subtitle')">
                        </p>
                    </div>

                    <div class="bg-surface-dark rounded-lg p-8 max-w-2xl mx-auto mb-8">
                        <div class="space-y-6">
                            <div class="flex items-start gap-4">
                                <span class="material-symbols-outlined text-primary text-xl mt-1">check_circle</span>
                                <div class="text-left">
                                    <h3 class="font-semibold text-text-dark mb-1" x-text="$store.i18n.t('welcome.secure_auth')"></h3>
                                    <p class="text-sm text-muted-dark" x-text="$store.i18n.t('welcome.secure_auth_desc')"></p>
                                </div>
                            </div>
                            <div class="flex items-start gap-4">
                                <span class="material-symbols-outlined text-primary text-xl mt-1">check_circle</span>
                                <div class="text-left">
                                    <h3 class="font-semibold text-text-dark mb-1" x-text="$store.i18n.t('welcome.controlled_access')"></h3>
                                    <p class="text-sm text-muted-dark" x-text="$store.i18n.t('welcome.controlled_access_desc')"></p>
                                </div>
                            </div>
                            <div class="flex items-start gap-4">
                                <span class="material-symbols-outlined text-primary text-xl mt-1">check_circle</span>
                                <div class="text-left">
                                    <h3 class="font-semibold text-text-dark mb-1" x-text="$store.i18n.t('welcome.automatic_data')"></h3>
                                    <p class="text-sm text-muted-dark" x-text="$store.i18n.t('welcome.automatic_data_desc')"></p>
                                </div>
                            </div>
                        </div>
                    </div>


                </div>

                <!-- Step 3: GitHub Authentication -->
                <div x-show="currentStep === 3" x-transition:enter="transition ease-out duration-500" x-transition:enter-start="opacity-0 transform scale-95" x-transition:enter-end="opacity-100 transform scale-100" class="text-center fade-in">
                    <div class="mb-12">
                        <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-gray-800 mb-6">
                            <svg class="w-12 h-12 text-white" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                            </svg>
                        </div>
                        <h1 class="text-4xl font-black text-text-dark mb-4" x-text="$store.i18n.t('welcome.auth_github_title')"></h1>
                        <p class="text-xl text-muted-dark max-w-2xl mx-auto leading-relaxed mb-8" x-text="$store.i18n.t('welcome.auth_github_subtitle')">
                        </p>
                    </div>

                    <div x-show="!isAuthenticated" class="space-y-6">
                        <div class="bg-surface-dark rounded-lg p-6 max-w-md mx-auto">
                            <div class="flex items-center gap-3 mb-4">
                                <span class="material-symbols-outlined text-primary">info</span>
                                <p class="text-sm text-muted-dark" x-text="$store.i18n.t('welcome.redirect_info')"></p>
                            </div>
                        </div>

                        <button @click="authenticateWithGitHub()" :disabled="isAuthenticating" class="bg-gray-900 hover:bg-gray-800 text-white font-semibold py-3 px-8 rounded-lg flex items-center gap-2 transition-all duration-300 transform hover:scale-105 mx-auto disabled:opacity-50 disabled:cursor-not-allowed">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                            </svg>
                            <span x-text="isAuthenticating ? $store.i18n.t('welcome.connecting') : $store.i18n.t('welcome.connect_with_github')"></span>
                        </button>

                        <button
                            x-show="isAuthenticating"
                            @click="isAuthenticating = false"
                            class="mt-4 px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-500 transition-colors duration-300 text-sm font-medium"
                        >
                            <span x-text="$store.i18n.t('common.cancel')"></span>
                        </button>
                    </div>

                    <div x-show="isAuthenticated" class="space-y-6">
                        <div class="bg-green-900/20 border border-green-700 rounded-lg p-6 max-w-md mx-auto">
                            <div class="flex items-center gap-3 mb-4">
                                <span class="material-symbols-outlined text-green-500">check_circle</span>
                                <p class="text-sm text-green-400" x-text="$store.i18n.t('welcome.auth_success')"></p>
                            </div>
                            <div x-show="userInfo" class="text-left">
                                <div class="flex justify-between items-start mb-4">
                                    <div>
                                        <p class="text-sm text-muted-dark mb-2" x-text="$store.i18n.t('welcome.connected_as')"></p>
                                        <div class="flex items-center gap-3">
                                            <img x-show="userInfo.avatar_url" :src="userInfo.avatar_url" :alt="userInfo.name" class="w-10 h-10 rounded-full">
                                            <div>
                                                <p class="font-semibold text-text-dark" x-text="userInfo.name || userInfo.login"></p>
                                                <p class="text-sm text-muted-dark" x-text="userInfo.email"></p>
                                            </div>
                                        </div>
                                    </div>
                                    <button @click="logoutFromGitHub()" 
                                            class="bg-red-600 hover:bg-red-500 text-white text-sm font-medium py-2 px-4 rounded-lg transition-colors duration-300 flex items-center gap-2">
                                        <span class="material-symbols-outlined text-lg">logout</span>
                                        <span x-text="$store.i18n.t('welcome.logout')"></span>
                                    </button>
                                </div>
                            </div>
                        </div>


                    </div>


                </div>

                <!-- Step 4: Node.js Detection and Setup -->
                <div x-show="currentStep === 4" x-transition:enter="transition ease-out duration-500" x-transition:enter-start="opacity-0 transform scale-95" x-transition:enter-end="opacity-100 transform scale-100" class="text-center fade-in">
                    <div class="mb-10">
                        <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-gray-800 mb-6">
                            <span class="material-symbols-outlined text-4xl text-primary">cloud_download</span>
                        </div>
                        <h1 class="text-4xl font-black text-text-dark mb-4" x-text="$store.i18n.t('welcome.download_nodejs_title')"></h1>
                        <p class="text-xl text-muted-dark max-w-2xl mx-auto leading-relaxed" x-text="$store.i18n.t('welcome.download_nodejs_subtitle')">
                        </p>
                    </div>

                    <div class="bg-surface-dark rounded-lg p-6 max-w-2xl mx-auto mb-6 text-left">
                        <div class="flex items-start gap-4">
                            <span class="material-symbols-outlined text-primary text-3xl">verified_user</span>
                            <div>
                                <h3 class="text-lg font-semibold text-text-dark mb-2" x-text="$store.i18n.t('welcome.nodejs_lts')"></h3>
                                <p class="text-sm text-muted-dark mb-3" x-text="$store.i18n.t('welcome.nodejs_lts_desc')">
                                </p>
                                <ul class="list-disc list-inside text-sm text-muted-dark space-y-1">
                                    <li x-text="$store.i18n.t('welcome.no_prompts')"></li>
                                    <li x-text="$store.i18n.t('welcome.works_with_existing')"></li>
                                    <li x-text="$store.i18n.t('welcome.can_reinstall')"></li>
                                </ul>
                            </div>
                        </div>
                    </div>

                    <div x-show="isDetectingNode" class="bg-surface-dark rounded-lg p-6 max-w-md mx-auto mb-4">
                        <div class="flex items-center gap-3">
                            <div class="animate-spin">
                                <span class="material-symbols-outlined text-primary">refresh</span>
                            </div>
                            <p class="text-sm text-muted-dark" x-text="$store.i18n.t('welcome.detecting_node')"></p>
                        </div>
                    </div>

                    <template x-if="nodeDetectionResult && nodeDetectionResult.runtime && nodeDetectionResult.runtime.installed && nodeDetectionResult.runtime.isValid">
                        <div class="bg-green-900/20 border border-green-700 rounded-lg p-6 max-w-xl mx-auto mb-4 text-left">
                            <div class="flex items-center gap-3 mb-3">
                                <span class="material-symbols-outlined text-green-500 text-xl">check_circle</span>
                                <p class="font-medium text-green-400" x-text="$store.i18n.t('welcome.node_installed')"></p>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <p class="text-xs uppercase text-muted-dark">Node.js</p>
                                    <p class="font-mono text-lg text-text-dark" x-text="`v${nodeDetectionResult.runtime.version}`"></p>
                                </div>
                                <div>
                                    <p class="text-xs uppercase text-muted-dark">npm</p>
                                    <p class="font-mono text-lg text-text-dark" x-text="nodeDetectionResult.runtime.npmVersion || $store.i18n.t('common.loading')"></p>
                                </div>
                                <div class="md:col-span-2">
                                    <p class="text-xs uppercase text-muted-dark">Path</p>
                                    <p class="text-sm text-muted-dark" x-text="nodeDetectionResult.runtime.nodePath"></p>
                                </div>
                            </div>
                        </div>
                    </template>

                    <template x-if="nodeDetectionResult && (!nodeDetectionResult.runtime || !nodeDetectionResult.runtime.installed || !nodeDetectionResult.runtime.isValid)">
                        <div class="bg-yellow-900/20 border border-yellow-700 rounded-lg p-6 max-w-xl mx-auto mb-4 text-left">
                            <div class="flex items-center gap-3">
                                <span class="material-symbols-outlined text-yellow-500 text-xl">info</span>
                                <p class="font-medium text-yellow-400" x-text="$store.i18n.t('welcome.node_not_downloaded')"></p>
                            </div>
                            <p class="text-sm text-muted-dark mt-3" x-text="$store.i18n.t('welcome.click_download')"></p>
                        </div>
                    </template>

                    <div x-show="nodeErrorMessage" class="bg-red-900/20 border border-red-700 rounded-lg p-4 max-w-xl mx-auto mb-4 text-left">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="material-symbols-outlined text-red-400">error</span>
                            <p class="text-red-200 font-medium" x-text="$store.i18n.t('welcome.error_check_node')"></p>
                        </div>
                        <p class="text-sm text-red-200" x-text="nodeErrorMessage"></p>
                    </div>

                    <div x-show="installingNode" class="bg-surface-dark rounded-lg p-5 max-w-xl mx-auto mb-4 text-left">
                        <div class="flex items-center gap-3 mb-3">
                            <div class="animate-spin">
                                <span class="material-symbols-outlined text-primary">downloading</span>
                            </div>
                            <div>
                                <p class="text-sm text-text-dark font-medium" x-text="nodeInstallProgress?.message || $store.i18n.t('welcome.downloading_node')"></p>
                                <p class="text-xs text-muted-dark" x-text="typeof nodeInstallProgress?.percent === 'number' ? `${nodeInstallProgress.percent}%` : ''"></p>
                            </div>
                        </div>
                        <div class="w-full bg-gray-700 rounded-full h-2 overflow-hidden">
                            <div class="h-full welcome-gradient transition-all duration-300" :style="`width: ${typeof nodeInstallProgress?.percent === 'number' ? nodeInstallProgress.percent : 10}%`"></div>
                        </div>
                    </div>

                    <div x-show="nodeInstallError" class="bg-red-900/20 border border-red-700 rounded-lg p-4 max-w-xl mx-auto mb-4 text-left">

                        <div class="flex items-center gap-2 mb-2">
                            <span class="material-symbols-outlined text-red-400">error</span>
                            <p class="text-red-300 font-medium" x-text="$store.i18n.t('welcome.node_install_failed')"></p>
                        </div>
                        <p class="text-sm text-red-200" x-text="nodeInstallError"></p>
                    </div>

                    <div x-show="nodeInstallSuccess" class="bg-green-900/20 border border-green-700 rounded-lg p-4 max-w-xl mx-auto mb-4 text-left">
                        <div class="flex items-center gap-2">
                            <span class="material-symbols-outlined text-green-400">task_alt</span>
                            <p class="text-green-200 text-sm" x-text="$store.i18n.t('welcome.node_download_success')"></p>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                    <div class="flex gap-4 justify-center">
                        <!-- Step 2: GitHub Authentication Explanation -->
                        <div x-show="currentStep === 2" class="flex gap-4 justify-center w-full">

                            <button @click="previousStep()" class="bg-gray-700 hover:bg-gray-600 text-white font-semibold py-3 px-6 rounded-lg transition-colors duration-300">
                                <span class="material-symbols-outlined align-middle mr-2">arrow_back</span>
                                <span x-text="$store.i18n.t('common.back')"></span>
                            </button>
                            
                            <button @click="nextStep()" 
                                    class="bg-primary hover:bg-green-500 text-white font-semibold py-3 px-8 rounded-lg flex items-center gap-2 transition-all duration-300 transform hover:scale-105">
                                <span x-text="$store.i18n.t('common.understand')"></span>
                                <span class="material-symbols-outlined">arrow_forward</span>
                            </button>
                        </div>

                        <!-- Step 3: GitHub Authentication -->
                        <div x-show="currentStep === 3" class="flex gap-4 justify-center w-full">
                            <button @click="previousStep()" class="bg-gray-700 hover:bg-gray-600 text-white font-semibold py-3 px-6 rounded-lg transition-colors duration-300">
                                <span class="material-symbols-outlined align-middle mr-2">arrow_back</span>
                                <span x-text="$store.i18n.t('common.back')"></span>
                            </button>
                            
                            <button @click="nextStep()" x-show="isAuthenticated" 
                                    class="bg-primary hover:bg-green-500 text-white font-semibold py-3 px-8 rounded-lg flex items-center gap-2 transition-all duration-300 transform hover:scale-105">
                                <span x-text="$store.i18n.t('common.next')"></span>
                                <span class="material-symbols-outlined">arrow_forward</span>
                            </button>
                        </div>

                        <!-- Step 4: Node.js Detection -->
                        <div x-show="currentStep === 4" class="flex flex-wrap gap-4 justify-center w-full">
                            <button @click="previousStep()" class="bg-gray-700 hover:bg-gray-600 text-white font-semibold py-2 px-4 rounded-lg transition-colors duration-300">
                                <span class="material-symbols-outlined align-middle mr-2">arrow_back</span>
                                <span x-text="$store.i18n.t('common.back')"></span>
                            </button>

                            <button @click="installManagedNode()" 
                                    x-show="shouldInstallRuntime()"
                                    :disabled="installingNode || isDetectingNode"
                                    class="bg-primary hover:bg-green-500 text-white font-semibold py-2 px-6 rounded-lg transition-all duration-200 disabled:opacity-60 disabled:cursor-not-allowed">
                                <span class="material-symbols-outlined align-middle mr-2">download</span>
                                <span x-text="installingNode ? $store.i18n.t('welcome.installing') : $store.i18n.t('welcome.download_install_nodejs')"></span>
                            </button>

                            <button @click="detectNode()" 
                                    :disabled="isDetectingNode"
                                    class="bg-gray-700 hover:bg-gray-600 text-white font-semibold py-2 px-6 rounded-lg transition-colors duration-200 disabled:opacity-60 disabled:cursor-not-allowed">
                                <span x-text="$store.i18n.t('welcome.verify_again')"></span>
                            </button>

                            <button @click="completeSetup()" 
                                    x-show="runtimePronto()"
                                    class="bg-primary hover:bg-green-500 text-white font-semibold py-2 px-6 rounded-lg transition-colors duration-200">
                                <span x-text="$store.i18n.t('welcome.finish_setup')"></span>
                            </button>
                        </div>

                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Footer - Fixed at bottom -->
    <div class="fixed-footer" x-data="welcomeWizard">
        <div class="flex justify-between items-center w-full">
            <p class="text-sm text-muted-dark" x-text="$store.i18n.t('welcome.step_of', {current: currentStep, total: totalSteps})"></p>
            <div class="flex gap-2">
                <template x-for="step in totalSteps" :key="step">
                    <div class="w-3 h-3 rounded-full transition-colors duration-300" 
                         :class="step <= currentStep ? 'bg-primary' : 'bg-gray-600'"></div>
                </template>
            </div>
        </div>
    </div>


    <script src="./i18n.js"></script>
<script src="./assets/js/alpine.min.js" defer></script>
    <script src="script.js" defer></script>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('welcomeWizard', () => ({
                currentStep: 1,
                totalSteps: 4,
                isAuthenticating: false,
                isAuthenticated: false,
                userInfo: null,
                // Node.js detection properties
                isDetectingNode: false,
                nodeDetectionResult: null,
                nodeErrorMessage: null,
                nodeInstallError: null,
                nodeInstallSuccess: false,
                nodeInstallProgress: null,
                installingNode: false,
                
                // Setup completion tracking
                setupCompleted: false,

                init() {
                    document.title = __t('welcome.page_title');

                    // Check if already authenticated
                    this.checkAuthenticationStatus();

                    if (window.electronAPI && window.electronAPI.onNodeInstallProgress) {
                        window.electronAPI.onNodeInstallProgress((progress) => {
                            this.nodeInstallProgress = progress;
                        });
                    }
                },

                nextStep() {
                    if (this.currentStep < this.totalSteps) {
                        this.currentStep++;
                        
                        // Check Node.js installation when moving to step 4
                        if (this.currentStep === 4) {
                            this.detectNode();
                        }
                    }
                },

                previousStep() {
                    if (this.currentStep > 1) {
                        this.currentStep--;
                    }
                },

                runtimePronto() {
                    const runtime = this.nodeDetectionResult?.runtime;
                    return !!(runtime && runtime.installed && runtime.isValid);
                },

                shouldInstallRuntime() {
                    const runtime = this.nodeDetectionResult?.runtime;
                    return !runtime || !runtime.installed || !runtime.isValid;
                },

                async checkAuthenticationStatus() {
                    try {
                        if (window.electronAPI && window.electronAPI.checkGitHubAuth) {
                            const authStatus = await window.electronAPI.checkGitHubAuth();
                            if (authStatus.authenticated) {
                                this.isAuthenticated = true;
                                this.userInfo = authStatus.userInfo;
                            }
                        }
                    } catch (error) {
                        console.error('Error checking authentication status:', error);
                    }
                },

                async authenticateWithGitHub() {
                    console.log('🔘 Authentication button clicked!');
                    console.log('🔍 Checking electronAPI availability:', !!window.electronAPI);
                    console.log('🔍 Checking authenticateWithGitHub method:', !!(window.electronAPI && window.electronAPI.authenticateWithGitHub));
                    
                    this.isAuthenticating = true;
                    try {
                        if (window.electronAPI && window.electronAPI.authenticateWithGitHub) {
                            console.log('📡 Calling authenticateWithGitHub API...');
                            const result = await window.electronAPI.authenticateWithGitHub();
                            console.log('📥 Authentication API response:', result);
                            
                            if (result.requiresDeviceCode) {
                                console.log('📱 Device code flow initiated:', {
                                    deviceCode: result.deviceCode,
                                    verificationUri: result.verificationUri,
                                    expiresIn: result.expiresIn,
                                    interval: result.interval
                                });
                                
                                // Show device code to user
                                const userCode = result.deviceCode;
                                const verificationUri = result.verificationUri;
                                
                                console.log('🔔 Showing device code to user...');
                                
                                // Create a modal or alert with the code
                                const proceed = confirm(
                                    __t('welcome.device_code_title') + '\n\n' +
                                    __t('welcome.device_code_step1', {url: verificationUri}) + '\n' +
                                    __t('welcome.device_code_step2', {code: userCode}) + '\n\n' +
                                    __t('welcome.device_code_step3')
                                );
                                
                                console.log('👤 User decision:', proceed);
                                
                                if (proceed) {
                                    console.log('🔄 Continuing authentication polling...');
                                    // Continue polling for token
                                    const authResult = await window.electronAPI.continueGitHubAuth(
                                        result.deviceCodeInternal, 
                                        result.interval
                                    );
                                    
                                    console.log('📥 Continue auth response:', authResult);
                                    
                                    if (authResult.success) {
                                        console.log('✅ Authentication successful!');
                                        this.isAuthenticated = true;
                                        this.userInfo = authResult.userInfo;
                                    } else {
                                        console.error('❌ Authentication continuation failed:', authResult.error);
                                        alert(__t('welcome.error_auth', {error: authResult.error}));
                                    }
                                } else {
                                    console.log('🚫 User cancelled authentication');
                                }
                            } else if (result.success) {
                                console.log('✅ Direct authentication successful!');
                                this.isAuthenticated = true;
                                this.userInfo = result.userInfo;
                            } else {
                                console.error('❌ Authentication failed:', result.error);
                                alert(__t('welcome.error_auth', {error: result.error}));
                            }
                        } else {
                            console.error('❌ electronAPI or authenticateWithGitHub not available');
                            alert(__t('welcome.error_auth_api'));
                        }
                    } catch (error) {
                        console.error('💥 Authentication error:', error);
                        console.error('🔍 Error stack:', error.stack);
                        alert(__t('welcome.error_auth', {error: error.message}));
                    } finally {
                        console.log('🏁 Authentication process finished');
                        this.isAuthenticating = false;
                    }
                },

                async completeSetup() {
                    try {
                        if (window.electronAPI && window.electronAPI.completeWelcomeSetup) {
                            const result = await window.electronAPI.completeWelcomeSetup();
                            
                            if (result && result.success) {
                                console.log('✅ Setup completed successfully, navigating to main screen');
                                window.electronAPI.navigateTo('index.html');
                            } else {
                                throw new Error(result?.error || __t('welcome.error_setup_mark'));
                            }
                        } else {
                            throw new Error(__t('welcome.error_setup_api'));
                        }
                    } catch (error) {
                        console.error('Error completing setup:', error);
                        alert(__t('welcome.error_finish_setup', {error: error.message}));
                    }
                },

                /**
                 * Logout from GitHub
                 */
                async logoutFromGitHub() {
                    try {
                        console.log('🔘 Logging out from GitHub...');
                        
                        if (window.electronAPI && window.electronAPI.logoutFromGitHub) {
                            const result = await window.electronAPI.logoutFromGitHub();
                            
                            if (result.success) {
                                console.log('✅ Successfully logged out from GitHub');
                                this.isAuthenticated = false;
                                this.userInfo = null;
                                
                                // Show success message briefly
                                const successDiv = document.createElement('div');
                                successDiv.className = 'fixed top-4 right-4 bg-green-600 text-white px-6 py-3 rounded-lg shadow-lg z-50';
                                successDiv.innerHTML = `
                                    <div class="flex items-center gap-2">
                                        <span class="material-symbols-outlined">check_circle</span>
                                        <span>${__t('welcome.disconnected_success')}</span>
                                    </div>
                                `;
                                document.body.appendChild(successDiv);
                                
                                // Remove success message after 3 seconds
                                setTimeout(() => {
                                    if (successDiv.parentNode) {
                                        successDiv.parentNode.removeChild(successDiv);
                                    }
                                }, 3000);
                            } else {
                                console.error('❌ Failed to logout from GitHub:', result.error);
                                alert(__t('welcome.error_logout', {error: result.error}));
                            }
                        } else {
                            console.error('❌ Logout API not available');
                            alert(__t('welcome.error_logout_api'));
                        }
                    } catch (error) {
                        console.error('💥 Logout error:', error);
                        alert(__t('welcome.error_logout', {error: error.message}));
                    }
                },

                // Node.js related methods
                async detectNode() {
                    this.isDetectingNode = true;
                    this.nodeErrorMessage = null;

                    try {
                        if (window.electronAPI && window.electronAPI.detectNode) {
                            const result = await window.electronAPI.detectNode();
                            console.log('Node.js detection result:', result);
                            
                            if (result.error) {
                                throw new Error(result.error);
                            }

                            this.nodeDetectionResult = result;
                        } else {
                            throw new Error(__t('welcome.error_detect_api'));
                        }
                    } catch (error) {
                        console.error('Error detecting Node.js:', error);
                        this.nodeErrorMessage = __t('welcome.error_detect', {error: error.message});
                        this.nodeDetectionResult = null;
                    } finally {
                        this.isDetectingNode = false;
                    }
                },

                async installManagedNode() {
                    try {
                        if (!window.electronAPI || !window.electronAPI.installManagedNode) {
                            throw new Error(__t('welcome.error_install_api'));
                        }

                        this.nodeInstallError = null;
                        this.nodeInstallSuccess = false;
                        this.installingNode = true;
                        this.nodeInstallProgress = { stage: 'starting', percent: 5, message: __t('welcome.preparing_download') };

                        const result = await window.electronAPI.installManagedNode();
                        if (!result.success) {
                            throw new Error(result.error || __t('welcome.error_install_node'));
                        }

                        this.nodeInstallSuccess = true;
                        this.nodeInstallProgress = { stage: 'completed', percent: 100, message: __t('welcome.install_complete') };
                        await this.detectNode();
                    } catch (error) {
                        console.error('Error installing managed Node.js:', error);
                        this.nodeInstallError = error.message;
                    } finally {
                        this.installingNode = false;
                    }
                },
            }));
        });
    </script>
</body>
</html>
