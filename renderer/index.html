<!DOCTYPE html>
<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Documental - Selecionar Projeto</title>
<link href="./assets/css/fonts.css" rel="stylesheet"/>

<link href="./assets/css/compiled.css" rel="stylesheet"/>
    <link href="./assets/css/theme-override.css" rel="stylesheet"/>


<script src="./shared/layout.js"></script>
<script src="./shared/header.js"></script>
<script src="./shared/footer.js"></script>
<script src="./shared/logo.js"></script>

</head>
<body class="bg-background-dark text-text-dark antialiased">
<script>
document.write(Documental.renderLayout({
  content: '\
<div class="flex-1 flex items-center justify-center p-8">\
<div class="w-full max-w-4xl">\
<div class="text-center mb-12">\
<div class="flex items-center justify-center gap-4 mb-4">\
' + Documental.renderLogo({ size: 'lg' }) + '\
<h1 class="text-5xl font-black text-text-dark">Documental</h1>\
</div>\
<p class="text-muted-dark text-lg">Seu ambiente de documentação centralizado.</p>\
</div>\
<div class="grid grid-cols-1 md:grid-cols-3 gap-8">\
<div class="bg-surface-dark rounded-lg p-6 flex flex-col items-center text-center hover:ring-2 hover:ring-primary transition-all duration-300 cursor-pointer" data-navigate="new.html">\
<span class="material-symbols-outlined text-5xl text-primary mb-4">create_new_folder</span>\
<h2 class="text-xl font-bold mb-2">Criar Novo Projeto</h2>\
<p class="text-muted-dark text-sm">Comece do zero com um novo projeto de documentação.</p>\
</div>\
<div class="bg-surface-dark rounded-lg p-6 flex flex-col items-center text-center hover:ring-2 hover:ring-primary transition-all duration-300 cursor-pointer" id="open-folder-button">\
<span class="material-symbols-outlined text-5xl text-primary mb-4">folder_open</span>\
<h2 class="text-xl font-bold mb-2">Abrir Pasta</h2>\
<p class="text-muted-dark text-sm">Abra um projeto existente a partir de uma pasta no seu computador.</p>\
</div>\
<div class="bg-surface-dark rounded-lg p-6 flex flex-col items-center text-center hover:ring-2 hover:ring-primary transition-all duration-300 cursor-pointer" data-navigate="all-projects.html">\
<span class="material-symbols-outlined text-5xl text-primary mb-4">folder_special</span>\
<h2 class="text-xl font-bold mb-2">Abrir Recente</h2>\
<p class="text-muted-dark text-sm">Acesse rapidamente seus projetos abertos recentemente.</p>\
</div>\
</div>\
<div class="mt-12">\
<h3 class="text-lg font-semibold text-muted-dark mb-4 px-2">Projetos Recentes</h3>\
<div class="space-y-3" id="recent-projects-container">\
<!-- Recent projects will be loaded dynamically here -->\
</div>\
</div>\
</div>\
</div>'
}));
Documental.initThemeAttributes();
</script>

<!-- Modal for folder selection confirmation -->
<div id="folder-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50" style="display: none;">
<div class="bg-surface-dark rounded-lg shadow-xl p-6 w-full max-w-md">
<h3 class="text-lg font-medium text-text-dark mb-4">Pasta Não Encontrada</h3>
<p class="text-sm text-muted-dark mb-6">A pasta selecionada não corresponde a nenhum projeto existente. Deseja adicionar esta pasta como um novo projeto?</p>
<div id="folder-info" class="bg-background-dark rounded p-3 mb-6 text-sm text-muted-dark">
<!-- Folder info will be inserted here -->
</div>
<div class="flex justify-end space-x-3">
<button id="cancel-folder" class="btn-secondary">Cancelar</button>
<button id="confirm-new-project" class="btn-primary">Criar Novo Projeto</button>
</div>
</div>
</div>

<script src="script.js" defer></script>
</body></html>
