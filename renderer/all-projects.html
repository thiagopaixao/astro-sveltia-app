<!DOCTYPE html>
<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Documental - Todos os Projetos</title>
<link href="./assets/css/fonts.css" rel="stylesheet"/>

<link href="./assets/css/compiled.css" rel="stylesheet"/>
    <link href="./assets/css/theme-override.css" rel="stylesheet"/>


<script src="./shared/layout.js"></script>
<script src="./shared/header.js"></script>
<script src="./shared/footer.js"></script>
<script src="./shared/logo.js"></script>

</head>
<body class="bg-background-dark text-text-dark antialiased">
<script>
document.write(Documental.renderLayout({
  content: '\
<div class="flex-1 flex items-center justify-center p-8">\
<div class="w-full max-w-4xl">\
<div class="text-center mb-8">\
<div class="flex items-center justify-center gap-4 mb-4">\
' + Documental.renderLogo({ size: 'md' }) + '\
<h1 class="text-4xl font-black text-text-dark">Todos os Projetos</h1>\
</div>\
<p class="text-muted-dark text-lg">Acesse todos os seus projetos criados.</p>\
</div>\
\
<div class="mb-6">\
<button data-navigate="index.html" class="btn-ghost flex items-center gap-2">\
<span class="material-symbols-outlined">arrow_back</span>\
<span>Voltar para tela inicial</span>\
</button>\
</div>\
\
<div class="bg-surface-dark rounded-lg p-6">\
<div class="flex items-center justify-between mb-4">\
<h2 class="text-xl font-semibold text-text-dark">Lista de Projetos</h2>\
<div class="text-sm text-muted-dark">\
<span id="projects-count">0</span> projetos encontrados\
</div>\
</div>\
<div class="space-y-3" id="all-projects-container">\
<!-- All projects will be loaded dynamically here -->\
</div>\
</div>\
</div>\
</div>'
}));
Documental.initThemeAttributes();
</script>

<!-- Modal de confirmação para remover projeto -->
<div id="delete-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50" style="display: none;">
  <div class="bg-surface-dark rounded-lg shadow-xl p-6 w-full max-w-md">
    <div class="flex items-center gap-3 mb-4">
      <span class="material-symbols-outlined text-danger text-2xl">delete</span>
      <h3 class="text-lg font-medium text-text-dark">Confirmar Remoção</h3>
    </div>
    <p class="text-sm text-muted-dark mb-6">Tem certeza que deseja remover este projeto? Esta ação não pode ser desfeita e irá apagar permanentemente o projeto e seus arquivos.</p>
    <div class="mb-4">
      <p class="text-xs text-muted-dark">Projeto:</p>
      <p id="delete-project-name" class="text-sm font-medium text-text-dark"></p>
    </div>
    <div class="flex justify-end space-x-3">
<button id="cancel-delete" class="btn-secondary">Cancelar</button>
<button id="confirm-delete" class="btn-danger">Remover</button>
    </div>
  </div>
</div>

<script src="script.js" defer></script>
</body></html>
